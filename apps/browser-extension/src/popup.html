<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multica Review</title>
    <style>
      body { width: 360px; margin: 0; font: 13px/1.4 Inter, ui-sans-serif, system-ui, sans-serif; color: #111827; background: #fff; }
      main { padding: 14px; }
      h1 { font-size: 16px; margin: 0 0 4px; }
      p { color: #6b7280; margin: 0 0 12px; }
      label { display: block; font-size: 12px; color: #374151; margin: 10px 0 4px; }
      input, select { box-sizing: border-box; width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 7px 8px; background: #fff; color: #111827; }
      .row { display: flex; gap: 8px; align-items: center; }
      button { border: 1px solid #d1d5db; background: #fff; border-radius: 6px; padding: 7px 10px; color: #111827; cursor: pointer; }
      button.primary { background: #111827; color: #fff; border-color: #111827; }
      button:disabled { opacity: 0.55; cursor: not-allowed; }
      .row > button { flex: 1; }
      .status { min-height: 18px; margin-top: 10px; color: #4b5563; font-size: 12px; }
      .warn { color: #b45309; }
    </style>
  </head>
  <body>
    <main>
      <h1>Multica Review</h1>
      <p>Capture the visible page and submit annotations as a project issue.</p>
      <label for="server-url">Multica URL</label>
      <input id="server-url" placeholder="https://app.multica.ai" />
      <div class="row" style="margin-top:10px;">
        <button id="login">Sign in</button>
        <button id="refresh">Refresh</button>
      </div>
      <label for="workspace">Workspace</label>
      <select id="workspace"></select>
      <label for="project">Project</label>
      <select id="project"></select>
      <div class="row" style="margin-top:12px;">
        <button id="save">Save</button>
        <button id="start" class="primary">Annotate page</button>
      </div>
      <div id="status" class="status"></div>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
