version: 1
name: Multica fork workflow
multica:
  source:
    repo: multica
    branch: main
    path: .multica
resources:
  repos:
    multica:
      url: https://github.com/EnakZzz/multica.git
      default_branch_hint: main
    upstream:
      url: https://github.com/multica-ai/multica.git
      default_branch_hint: main
roles:
  - key: developer
    name: Developer
    description: Implements feature work, resolves merge conflicts, and runs focused verification.
  - key: reviewer
    name: Reviewer
    description: Reviews branches before merge or deployment.
  - key: deployer
    name: Deployer
    description: Runs the self-host Docker update after reviewed changes land on main.
  - key: upstream_analyst
    name: Upstream analyst
    description: Tracks upstream multica-ai/multica changes and prepares prioritized merge reports.
pipelines:
  - path: pipelines/daily-feature-development.yaml
    role_bindings:
      prepare-branch: developer
      implement-feature: developer
      run-tests: developer
      agent-review: reviewer
      merge-main: developer
      deploy-update: deployer
  - path: pipelines/review-gated-feature-development.yaml
    role_bindings:
      prepare-branch: developer
      implement-feature: developer
      spec-compliance-review: reviewer
      code-quality-review: reviewer
      create-pr: developer
  - path: pipelines/upstream-sync-watch.yaml
    role_bindings:
      discover-upstream-commits: upstream_analyst
      create-commit-review-issues: upstream_analyst
automations:
  - name: Upstream sync watch
    pipeline: Upstream sync watch
    project_id: 67d74204-9294-4a5b-b1e6-92a9582168c9
    assignee_role: upstream_analyst
    status: paused
    cron: "0 9 * * 1"
    timezone: Asia/Shanghai
    description: Weekly upstream watch for this fork.
    prompt: >
      Inspect upstream/main from https://github.com/multica-ai/multica using
      the Upstream sync watch pipeline for project multica进化
      (project_id: 67d74204-9294-4a5b-b1e6-92a9582168c9). When triggering the
      attached pipeline, call POST /api/pipelines/{id}/run with JSON body
      {"title":"Upstream sync watch","project_id":"67d74204-9294-4a5b-b1e6-92a9582168c9"}.
      Create at most 10 new unassigned owner-review issues per run, scanning
      missing upstream commits oldest first and skipping commits that already
      have an upstream-sha:<full-sha> issue marker. Each new issue must include
      risk analysis, recommended action, and bootstrap instructions for the
      developer agent. Do not assign those commit review issues, do not create
      merge branches, and do not start Review gated feature development; the
      owner starts merge work later by assigning a specific commit review issue
      to the developer agent.
